<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Berkeley Paths">
    <title>Berkeley Paths Navigator</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="./manifest.json">
    
    <!-- Theme color for address bar -->
    <meta name="theme-color" content="#941B1E">
    
    <!-- Custom App Icons for iOS Home Screen -->
    <link rel="apple-touch-icon" href="./assets/icon.png">
    <link rel="apple-touch-icon" sizes="152x152" href="./assets/icon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="./assets/icon.png">
    <link rel="apple-touch-icon" sizes="167x167" href="./assets/icon.png">
    
    <!-- Standard favicon -->
    <link rel="icon" type="image/png" href="./assets/icon.png">
    
    <!-- Custom Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alike&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha384-sHL9NAb7lN7rfvG5lfHpm643Xkcjzp4jFvuavGOndn6pjVqS6ny56CAt3nsEVT4H"
          crossorigin="anonymous" />
    
    <!-- Tailwind CSS (pre-built, no CDN) -->
    <link rel="stylesheet" href="./src/tailwind.css" />
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="./src/styles.css">
    
    <style>
      #map {
        height: 500px;
        width: 100%;
        border-radius: 0.5rem;
      }
      
      @media (max-width: 768px) {
        #map {
          height: 400px;
        }
      }
    </style>
</head>
<body class="body-font">
    <div id="root"></div>
    
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha384-cxOPjt7s7Iz04uaHJceBmS+qpjv2JkIHNVcuOrM+YHwZOmJGBXI00mdUXEq65HTH"
            crossorigin="anonymous"></script>

    <!-- React -->
    <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"
            integrity="sha384-tMH8h3BGESGckSAVGZ82T9n90ztNXxvdwvdM6UoR56cYcf+0iGXBliJ29D+wZ/x8"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"
            integrity="sha384-bm7MnzvK++ykSwVJ2tynSE5TRdN+xL418osEVF2DE/L/gfWHj91J2Sphe582B1Bh"></script>
    <script src="https://unpkg.com/@babel/standalone@7.27.5/babel.min.js"
            integrity="sha384-Z5ORKeYdud+8p8OE0UauZf12AXaLUc4Sw8csUrmb7ftpS5Sd1HTTC3wMq/tAZ+E5"
            crossorigin="anonymous"></script>
    
    <!-- App Code -->
    <script type="text/babel" src="./src/app.jsx"></script>

    <!-- Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.swWaitingWorker = null;

        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js?v=12').then((reg) => {
            reg.update();

            reg.addEventListener('updatefound', () => {
              const newWorker = reg.installing;
              newWorker.addEventListener('statechange', () => {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  // Store reference so the app can send SKIP_WAITING
                  window.swWaitingWorker = newWorker;
                  window.dispatchEvent(new Event('swUpdateAvailable'));
                }
              });
            });
          });

          // When the new SW takes control, reload to serve fresh files
          navigator.serviceWorker.addEventListener('controllerchange', () => {
            window.location.reload();
          });
        });
      }
    </script>
</body>
</html>
